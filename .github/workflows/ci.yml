name: CI

on:
  push:
  pull_request:

jobs:
  go-ci:
    name: Go build / test / vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -short ./...

      - name: Vet
        run: go vet ./...

  frontend:
    name: Frontend build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Checkout sibling board-ui
        run: git clone --depth 1 https://github.com/vul-os/board-ui ../board-ui

      - name: Install and build sibling vulos-apps/ui
        run: cd ../vulos-apps/ui && npm install

      - name: Install and build sibling board-ui
        run: cd ../board-ui && npm install

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test
        working-directory: web
        run: npm test
